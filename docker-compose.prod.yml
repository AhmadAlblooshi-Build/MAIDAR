version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: maidar-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maidar_prod}
      POSTGRES_USER: ${POSTGRES_USER:-maidar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - maidar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maidar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: maidar-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - maidar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: maidar-backend-prod
    environment:
      # Database
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-maidar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-maidar_prod}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # App Settings
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      API_V1_PREFIX: /api/v1

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-https://maidar.ai,https://www.maidar.ai}

      # Email (SMTP)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@maidar.ai}
      FROM_NAME: ${FROM_NAME:-MAIDAR}

      # AI (Optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # URLs
      APP_URL: ${APP_URL:-https://maidar.ai}
      FRONTEND_URL: ${FRONTEND_URL:-https://maidar.ai}

      # Compliance
      COMPLIANCE_MODE: ${COMPLIANCE_MODE:-UAE}
      DATA_RESIDENCY_REGION: ${DATA_RESIDENCY_REGION:-UAE}

    volumes:
      - backend-logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - maidar-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.maidar.ai}
        NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:-/api/v1}
    container_name: maidar-frontend-prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.maidar.ai}
      NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:-/api/v1}
    ports:
      - "3000:3000"
    networks:
      - maidar-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: maidar-nginx-prod
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - maidar-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  backend-logs:
    driver: local
  nginx-logs:
    driver: local

networks:
  maidar-network:
    driver: bridge
