# Prometheus Configuration for MAIDAR Staging

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'staging'
    project: 'maidar'

# Scrape configurations
scrape_configs:
  # Backend API metrics
  - job_name: 'maidar-backend'
    static_configs:
      - targets: ['backend-staging:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL metrics (if postgres_exporter is added)
  - job_name: 'postgres'
    static_configs:
      - targets: []
    # Add postgres_exporter here if needed

  # Redis metrics (if redis_exporter is added)
  - job_name: 'redis'
    static_configs:
      - targets: []
    # Add redis_exporter here if needed
